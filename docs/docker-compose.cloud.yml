# ==============================================================================
# SudarshanChakra — Cloud VPS Docker Compose
# ==============================================================================
# Runs on vivasvan-tech.in VPS
# Services: OpenVPN, RabbitMQ, PostgreSQL, Spring Boot microservices,
#           React dashboard, Nginx reverse proxy
#
# Usage:
#   docker compose -f docker-compose.cloud.yml up -d
#   docker compose -f docker-compose.cloud.yml logs -f
# ==============================================================================

version: "3.8"

services:
  # ── OpenVPN Server ──────────────────────────────────────────────────────
  openvpn-server:
    image: kylemanna/openvpn
    container_name: openvpn-server
    ports:
      - "1194:1194/udp"
    volumes:
      - openvpn_data:/etc/openvpn
    cap_add:
      - NET_ADMIN
    restart: always

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    environment:
      POSTGRES_DB: sudarshanchakra
      POSTGRES_USER: ${DB_USER:-scadmin}
      POSTGRES_PASSWORD: ${DB_PASS:?Set DB_PASS in .env}
    ports:
      - "127.0.0.1:5432:5432"   # Only localhost — not exposed to internet
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-scadmin} -d sudarshanchakra"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G

  # ── RabbitMQ with MQTT Plugin ───────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    hostname: farm-broker
    ports:
      - "5672:5672"       # AMQP (internal, Java services)
      - "1883:1883"       # MQTT (VPN-only, edge nodes)
      - "8883:8883"       # MQTTS (TLS, Android app)
      - "15672:15672"     # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - ./certs:/etc/rabbitmq/certs:ro
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:?Set RABBITMQ_PASS in .env}
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Spring Boot Microservices ───────────────────────────────────────────
  # API Gateway
  api-gateway:
    image: ghcr.io/mandnargitech/sudarshanchakra/api-gateway:latest
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - ALERT_SERVICE_URL=http://alert-service:8081
      - DEVICE_SERVICE_URL=http://device-service:8082
      - AUTH_SERVICE_URL=http://auth-service:8083
      - SIREN_SERVICE_URL=http://siren-service:8084
    depends_on:
      - alert-service
      - device-service
      - auth-service
      - siren-service
    restart: always

  # Alert Service — consumes from RabbitMQ, stores in PostgreSQL
  alert-service:
    image: ghcr.io/mandnargitech/sudarshanchakra/alert-service:latest
    container_name: alert-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/sudarshanchakra
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-scadmin}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_USER:-admin}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASS}
      - # Push notifications via MQTT direct — no Firebase dependency
    volumes:
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    restart: always

  # Device Service — manages edge nodes, cameras, zones, worker tags
  device-service:
    image: ghcr.io/mandnargitech/sudarshanchakra/device-service:latest
    container_name: device-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/sudarshanchakra
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-scadmin}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
    depends_on:
      postgres: { condition: service_healthy }
    restart: always

  # Auth Service — JWT authentication, user management
  auth-service:
    image: ghcr.io/mandnargitech/sudarshanchakra/auth-service:latest
    container_name: auth-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/sudarshanchakra
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-scadmin}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - JWT_EXPIRATION_MS=86400000
    depends_on:
      postgres: { condition: service_healthy }
    restart: always

  # Siren Service — receives commands from app/dashboard, publishes to RabbitMQ
  siren-service:
    image: ghcr.io/mandnargitech/sudarshanchakra/siren-service:latest
    container_name: siren-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/sudarshanchakra
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-scadmin}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_USER:-admin}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASS}
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    restart: always

  # ── React Dashboard ────────────────────────────────────────────────────
  react-dashboard:
    image: ghcr.io/mandnargitech/sudarshanchakra/dashboard:latest
    container_name: react-dashboard
    restart: always

  # ── Nginx Reverse Proxy (TLS termination) ──────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api-gateway
      - react-dashboard
    restart: always

  # ── VPN Health Monitor ─────────────────────────────────────────────────
  vpn-health-monitor:
    image: python:3.12-slim
    container_name: vpn-health-monitor
    command: >
      bash -c "pip install pika && 
      while true; do python /app/vpn_health_monitor.py; sleep 60; done"
    volumes:
      - ./scripts/vpn_health_monitor.py:/app/vpn_health_monitor.py:ro
    depends_on:
      rabbitmq: { condition: service_healthy }
    restart: always
    network_mode: host  # Needs to ping VPN IPs

volumes:
  pg_data:
  rabbitmq_data:
  openvpn_data:
