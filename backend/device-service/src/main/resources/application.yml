spring:
  application:
    name: device-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sudarshanchakra}
    username: ${SPRING_DATASOURCE_USERNAME:scadmin}
    password: ${SPRING_DATASOURCE_PASSWORD:devpassword123}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASS:devpassword123}
    virtual-host: /
