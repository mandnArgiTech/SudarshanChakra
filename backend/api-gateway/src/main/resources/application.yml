spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: alert-service
          uri: ${ALERT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/alerts/**
        - id: device-service
          uri: ${DEVICE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/nodes/**,/api/v1/cameras/**,/api/v1/zones/**,/api/v1/tags/**
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/auth/**,/api/v1/users/**
        - id: siren-service
          uri: ${SIREN_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/siren/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
server:
  port: 8080
management:
  endpoints:
    web:
      exposure:
        include: health,info
