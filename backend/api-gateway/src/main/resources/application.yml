spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: mdm-service
          uri: ${MDM_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/mdm/**
        - id: alert-service
          uri: ${ALERT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/alerts/**
        - id: device-service
          uri: ${DEVICE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/nodes/**,/api/v1/cameras/**,/api/v1/zones/**,/api/v1/tags/**,/api/v1/water/**
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/auth/**,/api/v1/users/**,/api/v1/farms/**,/api/v1/audit/**,/api/v1/me/**
        - id: siren-service
          uri: ${SIREN_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/siren/**
        - id: edge-proxy
          uri: ${EDGE_FLASK_BASE_URL:http://localhost:5000}
          predicates:
            - Path=/edge/**
          filters:
            - StripPrefix=1
            - RemoveRequestHeader=Authorization
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:default-dev-secret-change-in-production-must-be-at-least-256-bits-long-for-hs256}

sc:
  gateway:
    module-filter:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
