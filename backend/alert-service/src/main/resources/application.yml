spring:
  application:
    name: alert-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sudarshanchakra}
    username: ${SPRING_DATASOURCE_USERNAME:scadmin}
    password: ${SPRING_DATASOURCE_PASSWORD:devpassword123}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${SPRING_RABBITMQ_USERNAME:admin}
    password: ${SPRING_RABBITMQ_PASSWORD:devpassword123}

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET:default-dev-secret-change-in-production-must-be-at-least-256-bits-long-for-hs256}

tenant:
  filter:
    enabled: ${TENANT_FILTER_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
