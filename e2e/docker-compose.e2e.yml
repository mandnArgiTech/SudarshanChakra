# Minimal E2E stack — extend with full services as needed
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sudarshanchakra
      POSTGRES_USER: scadmin
      POSTGRES_PASSWORD: devpassword123
    ports:
      - "5432:5432"
    volumes:
      - ../cloud/db/init.sql:/docker-entrypoint-initdb.d/01.sql:ro

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: devpassword123
    ports:
      - "5672:5672"
      - "15672:15672"
