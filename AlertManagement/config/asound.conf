# /etc/asound.conf — ALSA configuration for PCM5102A I2S DAC
# ===========================================================
# This forces all ALSA output through the I2S HiFiBerry DAC
# and provides software volume control.

pcm.!default {
    type softvol
    slave.pcm "i2s_dac"
    control {
        name "SoftMaster"
        card 0
    }
    min_dB -51.0
    max_dB 0.0
}

pcm.i2s_dac {
    type hw
    card 0
    device 0
    format S32_LE
    rate 44100
    channels 2
}

ctl.!default {
    type hw
    card 0
}
