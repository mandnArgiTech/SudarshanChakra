# /etc/nginx/sites-available/pa-audio — Edge AI Server
# =====================================================
# Serves MP3 files to the Pi over the local network.
#
# Setup:
#   1. Place audio files in /var/www/pa-audio/
#   2. sudo ln -s /etc/nginx/sites-available/pa-audio /etc/nginx/sites-enabled/
#   3. sudo nginx -t && sudo systemctl reload nginx
#
# Directory structure:
#   /var/www/pa-audio/
#   ├── suprabatham.mp3      (~20 min chant file)
#   └── siren.mp3            (security siren, ~10-30 seconds)
#
# Access URLs:
#   http://192.168.1.100/audio/suprabatham.mp3
#   http://192.168.1.100/audio/siren.mp3

server {
    listen 80;
    server_name _;

    # Serve audio files
    location /audio/ {
        alias /var/www/pa-audio/;
        autoindex off;

        # Allow only local network
        allow 192.168.1.0/24;
        deny all;

        # Optimize for streaming to Pi
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        # MIME types
        types {
            audio/mpeg mp3;
            audio/ogg  ogg;
            audio/wav  wav;
            audio/flac flac;
        }

        # Allow range requests (mpv uses these for seeking)
        add_header Accept-Ranges bytes;
    }
}
