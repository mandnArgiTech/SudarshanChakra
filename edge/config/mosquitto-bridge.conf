# ═══════════════════════════════════════════════════════════════
# Mosquitto — Edge Node Local MQTT Broker + VPS Bridge
# ═══════════════════════════════════════════════════════════════
#
# PURPOSE:
# ESP8266 water sensor and other farm IoT devices connect here
# via plain MQTT (no TLS — they can't do TLS). Mosquitto bridges
# selected topics to RabbitMQ on VPS over the VPN tunnel.
#
# FLOW:
#   ESP8266 → plain MQTT :1883 → Mosquitto (this) → VPN → RabbitMQ :1883
#   RabbitMQ → VPN → Mosquitto (this) → ESP8266 (commands)
#
# RUN: docker compose up -d mosquitto (in edge/docker-compose.yml)
# ═══════════════════════════════════════════════════════════════

# ── Local listener (farm LAN — no auth, no TLS) ──
listener 1883
allow_anonymous true

# ── Persistence ──
persistence true
persistence_location /mosquitto/data/

# ── Logging ──
log_dest stdout
log_type warning
log_type error
log_type notice
connection_messages true

# ═══════════════════════════════════════════════════════════════
# BRIDGE: farm-to-vps
# ═══════════════════════════════════════════════════════════════
#
# Connects to RabbitMQ MQTT plugin on VPS via VPN IP.
# RabbitMQ MQTT plugin accepts bridge connections.

connection farm-vps-bridge
address 10.8.0.1:1883
remote_username edge-publisher
remote_password CHANGE_ME_EDGE_MQTT_PASS

# ── Topics to bridge ──

# Water level: ESP8266 publishes → forward to VPS
# Pattern: {deviceTag}/water/level, {deviceTag}/water/status
topic # out 1 "" ""
# This bridges ALL local topics to VPS with QoS 1.
# For tighter control, replace the above with specific topics:
#   topic +/water/level out 1
#   topic +/water/status out 1
#   topic +/water/motor/ack out 1

# Commands: VPS sends → forward to local ESP8266
# Pattern: {deviceTag}/water/command, {deviceTag}/water/motor/command
topic +/water/command in 1
topic +/water/motor/command in 1

# ── Bridge settings ──
cleansession false
start_type automatic
try_private true
bridge_protocol_version mqttv311
keepalive_interval 60
restart_timeout 10 30
notifications false
