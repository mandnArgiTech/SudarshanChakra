# ═══════════════════════════════════════════════════════════════
# Mosquitto — Edge Node Local Broker + VPS Bridge
# ═══════════════════════════════════════════════════════════════
#
# LOCAL BROKER: Accepts plain MQTT from ESP8266, LoRa bridge,
# PA system — anything on the farm LAN. Always running.
#
# VPS BRIDGE: Forwards to RabbitMQ on VPS via VPN tunnel.
# If VPN is down, bridge retries every 10-30s. Messages queue
# locally (QoS 1 + persistent session). Zero data loss.
#
# ═══════════════════════════════════════════════════════════════

# ── Local listener (farm LAN) ──
listener 1883
allow_anonymous true

# ── Persistence (survives restarts, queues messages during VPN outage) ──
persistence true
persistence_location /mosquitto/data/
max_queued_messages 10000
autosave_interval 60

# ── Logging ──
log_dest stdout
log_type warning
log_type error
log_type notice
connection_messages true

# ═══════════════════════════════════════════════════════════════
# BRIDGE TO VPS
# ═══════════════════════════════════════════════════════════════
# Connects to RabbitMQ MQTT plugin on VPS via VPN.
# If VPN is down: bridge stays in retry loop. No crash, no data loss.
# When VPN comes up: bridge auto-connects, queued messages flush.

connection farm-vps-bridge
address 10.8.0.1:1883
remote_username edge-publisher
remote_password CHANGE_ME_EDGE_MQTT_PASS

# ── Water sensor: local ESP8266 → VPS ──
topic +/water/level out 1
topic +/water/status out 1

# ── Water commands: VPS → local ESP8266 ──
topic +/water/command in 1
topic +/water/motor/command in 1

# ── Alerts: edge-ai publishes locally → VPS ──
topic farm/alerts/+ out 1

# ── Admin commands: VPS → edge (zone reload, model update) ──
topic farm/admin/+ in 1

# ── MDM location from worker phones (if they connect via farm WiFi) ──
topic farm/mdm/+/telemetry out 1

# ── Bridge reliability ──
cleansession false
start_type automatic
try_private true
bridge_protocol_version mqttv311
keepalive_interval 60
restart_timeout 10 30
notifications false
