# rabbitmq.conf — SudarshanChakra VPS Broker Configuration
# =========================================================

# MQTT plugin configuration
mqtt.listeners.tcp.default = 1883
mqtt.listeners.ssl.default = 8883
mqtt.allow_anonymous = false
mqtt.vhost = /
mqtt.exchange = farm.events
mqtt.subscription_ttl = 86400000
mqtt.prefetch = 10

# SSL/TLS for MQTTS (Android app connections)
ssl_options.cacertfile = /etc/rabbitmq/certs/ca.pem
ssl_options.certfile = /etc/rabbitmq/certs/server.pem
ssl_options.keyfile = /etc/rabbitmq/certs/server-key.pem
ssl_options.verify = verify_none

# Management UI
management.listener.port = 15672
management.listener.ssl = false

# Memory limits
vm_memory_high_watermark.relative = 0.6
vm_memory_high_watermark_paging_ratio = 0.75

# Disk free limit
disk_free_limit.absolute = 1GB

# Logging
log.console = true
log.console.level = info

# Default user permissions (override via rabbitmqctl for production)
default_user_tags.administrator = true
