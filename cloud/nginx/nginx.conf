# ==============================================================================
# SudarshanChakra — Nginx Reverse Proxy for Cloud VPS
# ==============================================================================
# TLS termination, API gateway routing, React dashboard serving
# Place at: ./nginx/nginx.conf (referenced by docker-compose.cloud.yml)
#
# Certs: Use certbot/Let's Encrypt for vivasvan-tech.in
#   certbot certonly --standalone -d vivasvan-tech.in
#   Copy to ./certs/fullchain.pem and ./certs/privkey.pem
# ==============================================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name vivasvan-tech.in;
        return 301 https://$host$request_uri;
    }

    # Main HTTPS server
    server {
        listen 443 ssl http2;
        server_name vivasvan-tech.in;

        # TLS certificates (Let's Encrypt)
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── React Dashboard (frontend) ──
        location / {
            proxy_pass http://react-dashboard:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── API Gateway (Spring Boot microservices) ──
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://api-gateway:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for long-running queries
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # ── Auth endpoints (stricter rate limiting) ──
        location /api/v1/auth/ {
            limit_req zone=auth burst=3 nodelay;

            proxy_pass http://api-gateway:8080/api/v1/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── WebSocket for real-time alert feed ──
        location /ws/ {
            proxy_pass http://api-gateway:8080/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;  # Keep WebSocket alive for 24h
        }

        # ── Health check ──
        location /health {
            proxy_pass http://api-gateway:8080/actuator/health;
            access_log off;
        }

        # ── Deny access to sensitive paths ──
        location ~ /\. {
            deny all;
        }
    }

    # ── RabbitMQ Management UI (internal access only) ──
    # Access via SSH tunnel: ssh -L 15672:localhost:15672 user@vivasvan-tech.in
    server {
        listen 127.0.0.1:15673;
        location / {
            proxy_pass http://rabbitmq:15672;
        }
    }
}
