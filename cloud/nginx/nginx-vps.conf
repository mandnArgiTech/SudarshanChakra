# Nginx — VPS: HTTP default_server (IP / :9080) + HTTPS for public FQDN (Let's Encrypt).
#
# Replace vivasvan-tech.in below (server_name + ssl paths) if your domain differs; paths must
# match /etc/letsencrypt/live/<domain>/ after certbot on the host (mounted read-only).
#
# If cert files are missing, nginx will not start. For HTTP-only labs use
# cloud/nginx/nginx-vps-http.conf and remove 443 + letsencrypt from docker-compose.vps.yml
# (see docs/DEPLOYMENT_GUIDE.md §1.4).
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    upstream api_gateway { server api-gateway:8080; }
    upstream react_dashboard { server react-dashboard:80; }

    # --- Shared location logic (443 + default HTTP) ---------------------------------
    # Duplicated per server block so TLS and cleartext stay explicit (no nested include).

    # --- HTTPS (public hostname) ----------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name vivasvan-tech.in www.vivasvan-tech.in;

        ssl_certificate     /etc/letsencrypt/live/vivasvan-tech.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vivasvan-tech.in/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        location / {
            proxy_pass http://react_dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://api_gateway/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /ws/ {
            proxy_pass http://api_gateway/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        location /health {
            proxy_pass http://api_gateway/actuator/health;
            access_log off;
        }
    }

    # --- HTTP: redirect FQDN to HTTPS (Host header matches public name) ------------
    server {
        listen 80;
        server_name vivasvan-tech.in www.vivasvan-tech.in;
        return 301 https://$host$request_uri;
    }

    # --- HTTP: default — keep http://<ip>:9080 and non-matching Host working ---------
    server {
        listen 80 default_server;
        server_name _;

        location / {
            proxy_pass http://react_dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://api_gateway/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /ws/ {
            proxy_pass http://api_gateway/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        location /health {
            proxy_pass http://api_gateway/actuator/health;
            access_log off;
        }
    }
}
