# SudarshanChakra — optional overlay: security-focused stack notes.
# Merge with the main compose file when you want auth + gateway + audit-capable services only.
#
# Typical services: postgres, rabbitmq, auth-service, api-gateway (and optionally device/alert for device APIs).
# Add TLS termination (reverse proxy), JWT rotation, and RabbitMQ TLS when hardening production.
#
# Example:
#   docker compose -f docker-compose.yml -f docker-compose.profile-security.yml up -d
#
# Ensure `JWT_SECRET`, DB passwords, and `SUPER_ADMIN` bootstrap users are set via secrets, not defaults.

services: {}
