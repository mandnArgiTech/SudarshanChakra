# ==============================================================================
# SudarshanChakra — VPS Docker Compose (local images, HTTP + HTTPS)
# ==============================================================================
# Compose profiles (G-18): pass at least one — e.g. --profile full
#   full        — all services (incl. siren, mdm)
#   security    — no mdm-service
#   monitoring  — no siren, no mdm (same containers as water_only)
#   water_only  — same as monitoring; farm modules differ (use API / deploy script)
#   dev         — optional; adds farm-simulator (with --profile full)
#
# Use with: ./cloud/deploy.sh (default --profile full) or:
#   docker compose -f docker-compose.vps.yml --profile full up -d
# Requires: cloud/.env (copy from .env.example), Docker, docker compose
#
# Nginx: HTTP on host port 9080 → container 80 (http://<ip>:9080). HTTPS on host 443 →
# container 443 for vivasvan-tech.in (see cloud/nginx/nginx-vps.conf). Host must have LE certs
# under /etc/letsencrypt (run cloud/scripts/setup_tls.sh). If 443 is already used on the host,
# map e.g. "8443:443" and use https://<domain>:8443.
#
# HTTP-only (no certs): mount cloud/nginx/nginx-vps-http.conf, remove the 443 port line and
# the /etc/letsencrypt volume from nginx below — see docs/DEPLOYMENT_GUIDE.md §1.4.
# No OpenVPN/VPN health in this profile.
# ==============================================================================

services:
  postgres:
    profiles: [full, security, monitoring, water_only]
    image: postgres:16-alpine
    container_name: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    environment:
      POSTGRES_DB: sudarshanchakra
      POSTGRES_USER: ${DB_USER:-scadmin}
      POSTGRES_PASSWORD: ${DB_PASS:?Set DB_PASS in cloud/.env}
    ports:
      - "127.0.0.1:5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-scadmin} -d sudarshanchakra"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    profiles: [full, security, monitoring, water_only]
    image: rabbitmq:3-management
    # No container_name: avoids conflict with an existing `docker run --name rabbitmq` (AGENTS.md).
    # Other services still reach this broker via the Compose DNS name `rabbitmq`.
    hostname: farm-broker
    ports:
      - "5672:5672"
      - "1883:1883"
      - "15672:15672"
      - "15675:15675" # rabbitmq_web_mqtt (browser simulator)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - ./rabbitmq/conf.d:/etc/rabbitmq/conf.d:ro
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:?Set RABBITMQ_PASS in cloud/.env}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-sudarshanchakra-dev-cookie}
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5

  api-gateway:
    profiles: [full, security, monitoring, water_only]
    image: sudarshanchakra/api-gateway:latest
    container_name: api-gateway
    # Port 8080 not exposed on host; access via nginx on port 80 (e.g. /api/...)
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - ALERT_SERVICE_URL=http://alert-service:8081
      - DEVICE_SERVICE_URL=http://device-service:8082
      - AUTH_SERVICE_URL=http://auth-service:8083
      - SIREN_SERVICE_URL=http://siren-service:8084
      - MDM_SERVICE_URL=http://mdm-service:8085
    # Do not depend_on siren/mdm — they may be omitted by profile (monitoring/water_only/security).
    depends_on:
      - alert-service
      - device-service
      - auth-service
    restart: always

  alert-service:
    profiles: [full, security, monitoring, water_only]
    image: sudarshanchakra/alert-service:latest
    container_name: alert-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/sudarshanchakra
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-scadmin}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_USER:-admin}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASS}
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    restart: always

  device-service:
    profiles: [full, security, monitoring, water_only]
    image: sudarshanchakra/device-service:latest
    container_name: device-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/sudarshanchakra
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-scadmin}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
    depends_on:
      postgres: { condition: service_healthy }
    restart: always

  auth-service:
    profiles: [full, security, monitoring, water_only]
    image: sudarshanchakra/auth-service:latest
    container_name: auth-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/sudarshanchakra
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-scadmin}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in cloud/.env}
      - JWT_EXPIRATION_MS=86400000
    depends_on:
      postgres: { condition: service_healthy }
    restart: always

  siren-service:
    profiles: [full, security]
    image: sudarshanchakra/siren-service:latest
    container_name: siren-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/sudarshanchakra
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-scadmin}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_USER:-admin}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASS}
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    restart: always

  mdm-service:
    profiles: [full]
    image: sudarshanchakra/mdm-service:latest
    container_name: mdm-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/sudarshanchakra
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-scadmin}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_USER:-admin}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASS}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in cloud/.env}
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    restart: always

  react-dashboard:
    profiles: [full, security, monitoring, water_only]
    image: sudarshanchakra/dashboard:latest
    container_name: react-dashboard
    restart: always

  nginx:
    profiles: [full, security, monitoring, water_only]
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "9080:80"   # SudarshanChakra dashboard/API (vivasvan-tech.in may point at other apps on :80)
      - "443:443"   # HTTPS; use "8443:443" if host 443 is taken
    volumes:
      - ./nginx/nginx-vps.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api-gateway
      - react-dashboard
    restart: always

  # ── OpenVPN Server ────────────────────────────────────────────────────
  # Farm edge nodes dial in here. Creates 10.8.0.0/24 tunnel.
  # VPS = 10.8.0.1, Edge Node A = 10.8.0.10, Edge Node B = 10.8.0.11
  # Edge Mosquitto bridges MQTT over this tunnel to RabbitMQ :1883.
  #
  # First-time setup:
  #   1. Run cloud/vpn/setup_vpn_server.sh to generate PKI + certs
  #   2. Copy client .ovpn files to edge nodes
  #   3. docker compose up -d openvpn-server
  openvpn-server:
    profiles: [full, security]
    image: kylemanna/openvpn:2.4
    container_name: openvpn-server
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    ports:
      - "1194:1194/udp"
    volumes:
      - openvpn-data:/etc/openvpn
    restart: always
    healthcheck:
      test: ["CMD", "pgrep", "openvpn"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  simulator:
    profiles: [dev]
    image: sudarshanchakra/simulator:latest
    build:
      context: ../simulator
      dockerfile: Dockerfile
    container_name: farm-simulator
    ports:
      - "3001:80"
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  pg_data:
  rabbitmq_data:
  openvpn-data:
