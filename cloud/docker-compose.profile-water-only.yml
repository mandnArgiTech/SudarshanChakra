# SudarshanChakra — G-18 profile reference: water_only
# ==============================================================================
# Service selection is defined by Compose profiles on docker-compose.vps.yml.
# This file is documentation only (no merge required).
#
# Profile: water_only
#   Includes: postgres, rabbitmq, auth, alert, device, api-gateway, dashboard, nginx
#   Excludes: siren-service, mdm-service (same as monitoring)
#
# Set modulesEnabled for the farm to water/pumps/alerts (etc.) via scripts/deploy_saas_farm.sh
# or POST /api/v1/farms — see docs/garuda/stories/G-18_DEPLOY_PROFILES.md.
#
# Example:
#   cd cloud && docker compose -f docker-compose.vps.yml --profile water_only up -d
#
# Or: ./cloud/deploy.sh --profile water_only
# ==============================================================================
services: {}
