# SudarshanChakra — OpenVPN server (template)
# Default layout from setup_vpn_server.sh: OVPN_ROOT=/etc/openvpn/sc-farm
# PKI: $OVPN_ROOT/easy-rsa/pki/   ta.key: $OVPN_ROOT/ta.key

port 1194
proto udp
dev tun
user nobody
group nogroup
persist-key
persist-tun

topology subnet
server 10.8.0.0 255.255.255.0
ifconfig-pool-persist /var/log/openvpn/sc-ipp.txt

client-config-dir /etc/openvpn/sc-farm/ccd

ca /etc/openvpn/sc-farm/easy-rsa/pki/ca.crt
cert /etc/openvpn/sc-farm/easy-rsa/pki/issued/server.crt
key /etc/openvpn/sc-farm/easy-rsa/pki/private/server.key
dh /etc/openvpn/sc-farm/easy-rsa/pki/dh.pem

tls-auth /etc/openvpn/sc-farm/ta.key 0

data-ciphers AES-256-GCM:AES-128-GCM:CHACHA20-POLY1305
tls-ciphersuites TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256
tls-version-min 1.2

remote-cert-tls client

keepalive 10 60
explicit-exit-notify 1

client-to-client

# Optional: push farm LAN route to clients
# push "route 192.168.1.0 255.255.255.0"

verb 3
status /var/log/openvpn/sc-status.log
status-version 2
