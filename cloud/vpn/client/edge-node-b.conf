# SudarshanChakra — OpenVPN client template: Edge Node B (→ 10.8.0.11 via server CCD)
# Deploy as edge/vpn/edge-node-b.ovpn for dperson/openvpn-client.

client
dev tun
proto udp
remote YOUR_VPS_HOST 1194
resolv-retry infinite
nobind
persist-key
persist-tun
remote-cert-tls server
verb 3

key-direction 1

# See edge-node-a.conf for ca/cert/key / inline <ca> block examples.
