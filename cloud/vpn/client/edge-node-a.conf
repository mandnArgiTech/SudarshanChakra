# SudarshanChakra — OpenVPN client template: Edge Node A (→ 10.8.0.10 via server CCD)
# Deploy as edge/vpn/edge-node-a.ovpn for dperson/openvpn-client (same syntax).
# Replace YOUR_VPS_HOST and paths or embed <ca>/<cert>/<key> blocks from generated files.

client
dev tun
proto udp
remote YOUR_VPS_HOST 1194
resolv-retry infinite
nobind
persist-key
persist-tun
remote-cert-tls server
verb 3

# tls-auth direction 1 on client
key-direction 1

# --- Reference paths (after copying certs to edge host) ---
# ca /etc/openvpn/ca.crt
# cert /etc/openvpn/edge-node-a.crt
# key /etc/openvpn/edge-node-a.key
# tls-auth /etc/openvpn/ta.key 1

# Or use inline blocks (typical .ovpn export):
# <ca>
# ... paste ca.crt ...
# </ca>
# <cert>
# ... paste edge-node-a.crt ...
# </cert>
# <key>
# ... paste edge-node-a.key ...
# </key>
# <tls-auth>
# ... paste ta.key ...
# </tls-auth>
