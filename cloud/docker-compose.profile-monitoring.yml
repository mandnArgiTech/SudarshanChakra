# SudarshanChakra — G-18 profile reference: monitoring
# ==============================================================================
# Service selection is defined by Compose profiles on docker-compose.vps.yml.
# This file is documentation only (no merge required).
#
# Profile: monitoring
#   Includes: postgres, rabbitmq, auth, alert, device, api-gateway, dashboard, nginx
#   Excludes: siren-service, mdm-service
#
# Same container set as water_only; differ by farm modulesEnabled via API / deploy script.
#
# Example:
#   cd cloud && docker compose -f docker-compose.vps.yml --profile monitoring up -d
#
# Or: ./cloud/deploy.sh --profile monitoring
# ==============================================================================
services: {}
