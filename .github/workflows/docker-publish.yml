name: Docker publish (GHCR)

# Pushes to main (path-filtered): :latest + :<sha> per image.
# Tag pushes (any tag): paths filter is ignored by GitHub — full matrix runs; adds :<tag> + :<sha>.
on:
  push:
    branches:
      - main
    tags:
      - '**'
    paths:
      - 'backend/**'
      - 'dashboard/**'
      - '.github/workflows/docker-publish.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Backend Dockerfiles expect context backend/ (see each Dockerfile header).
        include:
          - service: alert-service
            context: backend
            dockerfile: backend/alert-service/Dockerfile
          - service: auth-service
            context: backend
            dockerfile: backend/auth-service/Dockerfile
          - service: device-service
            context: backend
            dockerfile: backend/device-service/Dockerfile
          - service: siren-service
            context: backend
            dockerfile: backend/siren-service/Dockerfile
          - service: mdm-service
            context: backend
            dockerfile: backend/mdm-service/Dockerfile
          - service: api-gateway
            context: backend
            dockerfile: backend/api-gateway/Dockerfile
          - service: dashboard
            context: dashboard
            dockerfile: dashboard/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: img
        env:
          OWNER_RAW: ${{ github.repository_owner }}
          SERVICE: ${{ matrix.service }}
          SHA: ${{ github.sha }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          OWNER=$(echo "$OWNER_RAW" | tr '[:upper:]' '[:lower:]')
          BASE="ghcr.io/${OWNER}/${SERVICE}"
          OUT="${BASE}:${SHA}"
          if [ "$REF_TYPE" = "branch" ] && [ "$REF_NAME" = "main" ]; then
            OUT="${OUT}"$'\n'"${BASE}:latest"
          fi
          if [ "$REF_TYPE" = "tag" ]; then
            OUT="${OUT}"$'\n'"${BASE}:${REF_NAME}"
          fi
          {
            echo "tags<<DELIM"
            echo "$OUT"
            echo "DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.img.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
